<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>からっぽマネージャー（簡易版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF3EF;
    --surface:#FFFFFF;
    --ink:#2B3A36;
    --ink-soft:#5B6B66;
    --accent:#FF8A65;
    --accent-soft:#FFE0D4;
    --sage:#DCE8E2;
    --sage-line:#C3D6CD;
    --wait-bg:#EDEAF6;
    --wait-ink:#5B4E8C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Sans JP',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    padding:28px 20px 100px;
    position:relative;
  }
  header{text-align:center;margin-bottom:18px;}
  header .logo{
    font-family:'Zen Maru Gothic',sans-serif;
    font-weight:700;
    font-size:22px;
  }
  header .tagline{font-size:12.5px;color:var(--ink-soft);margin-top:4px;}
  header .modebadge{
    display:inline-block;margin-top:8px;
    font-size:10.5px;color:#7A6A2E;background:#F1EBD9;
    padding:3px 10px;border-radius:10px;
  }

  .orb-zone{display:flex;flex-direction:column;align-items:center;margin:18px 0 30px;}
  .orb-wrap{width:160px;height:160px;display:flex;align-items:center;justify-content:center;position:relative;}
  .orb{
    width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FFFFFF, var(--sage) 60%, var(--sage-line));
    box-shadow:0 8px 30px rgba(60,90,80,0.18);
    animation:breathe 4.2s ease-in-out infinite;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .25s ease;
  }
  .orb.recording{
    background:radial-gradient(circle at 35% 30%, #FFF3EE, var(--accent-soft) 55%, var(--accent));
    animation:breathe-fast 1.4s ease-in-out infinite;
  }
  .orb.releasing{animation:release .9s ease forwards;}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  @keyframes breathe-fast{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
  @keyframes release{0%{transform:scale(1);}40%{transform:scale(1.3);opacity:1;}100%{transform:scale(0.2);opacity:0;}}
  .mic-icon{width:34px;height:34px;fill:var(--ink-soft);}
  .orb.recording .mic-icon{fill:var(--accent);}
  .orb-hint{margin-top:14px;font-size:13px;color:var(--ink-soft);text-align:center;min-height:18px;}

  .text-fallback{display:flex;gap:8px;margin-top:6px;width:100%;}
  .text-fallback input{
    flex:1;border:1px solid var(--sage-line);border-radius:14px;
    padding:10px 14px;font-size:14px;background:var(--surface);color:var(--ink);
  }
  .text-fallback button{
    border:none;background:var(--accent);color:#fff;padding:0 16px;
    border-radius:14px;font-size:13px;font-weight:500;
  }

  .confirm-panel{
    width:100%;
    background:var(--surface);
    border:1px solid var(--sage-line);
    border-radius:18px;
    padding:16px;
    margin-top:14px;
    box-shadow:0 6px 20px rgba(60,90,80,0.1);
  }
  .confirm-panel .cp-title{
    font-size:13.5px;
    font-weight:500;
    color:var(--ink);
    margin-bottom:4px;
    line-height:1.5;
  }
  .confirm-panel .cp-meta{
    font-size:11px;
    color:var(--ink-soft);
    margin-bottom:12px;
  }
  .confirm-panel .cp-question{
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .cp-options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .cp-option{
    border:1px solid var(--sage-line);
    background:#fff;
    border-radius:12px;
    padding:10px 6px;
    font-size:12.5px;
    color:var(--ink);
    text-align:center;
    cursor:pointer;
  }
  .cp-option.self{border-color:var(--accent);color:#9A4B2E;background:var(--accent-soft);}
  .cp-option.wait{border-color:#C9C0E6;color:var(--wait-ink);background:var(--wait-bg);}
  .cp-cancel{
    display:block;
    margin:10px auto 0;
    border:none;background:transparent;
    color:#9AAAA4;font-size:11.5px;
    text-decoration:underline;
  }

  section.block{margin-top:30px;}
  .block-title{
    font-family:'Zen Maru Gothic',sans-serif;font-size:15px;font-weight:700;
    margin-bottom:10px;display:flex;align-items:center;gap:6px;
  }
  .block-title small{font-weight:400;color:var(--ink-soft);font-size:11px;}

  .suggest-card{
    background:linear-gradient(135deg,#FFFFFF, #FFF6F1);
    border:1px solid var(--accent-soft);border-radius:18px;
    padding:16px 16px;margin-bottom:10px;
    box-shadow:0 4px 16px rgba(255,138,101,0.08);
  }
  .suggest-card .msg{font-size:14px;font-weight:500;color:#9A4B2E;margin-bottom:6px;line-height:1.5;}
  .suggest-card .title{font-size:13.5px;color:var(--ink);}
  .empty-note{
    font-size:13px;color:var(--ink-soft);background:var(--surface);
    border-radius:16px;padding:16px;text-align:center;line-height:1.6;
  }

  .task-card{
    background:var(--surface);border-radius:16px;padding:14px 14px;margin-bottom:8px;
    display:flex;align-items:flex-start;gap:10px;border:1px solid #ECEFED;
  }
  .task-card.waiting{
    background:linear-gradient(135deg,#FFFFFF,#FAF9FD);
    border:1px solid #E2DCF3;
  }
  .task-card.done{opacity:.45;}
  .check-btn{
    width:24px;height:24px;border-radius:50%;border:2px solid var(--sage-line);
    flex:0 0 auto;margin-top:2px;background:#fff;display:flex;align-items:center;justify-content:center;
  }
  .check-btn.checked{background:var(--accent);border-color:var(--accent);}
  .check-btn svg{width:13px;height:13px;fill:#fff;display:none;}
  .check-btn.checked svg{display:block;}
  .task-main{flex:1;min-width:0;}
  .task-title{font-size:14px;font-weight:500;margin-bottom:4px;}
  .task-card.done .task-title{text-decoration:line-through;}
  .task-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;}
  .tag{padding:2px 8px;border-radius:10px;background:var(--sage);color:#3E5A50;}
  .tag.priority-high{background:#FFE0D4;color:#9A4B2E;}
  .tag.priority-mid{background:#F1EBD9;color:#7A6A2E;}
  .tag.priority-low{background:#E6EAEF;color:#52606D;}
  .tag.deadline{background:#E9F1EC;color:#3E5A50;}
  .tag.wait{background:var(--wait-bg);color:var(--wait-ink);}
  .del-btn{
    border:none;background:transparent;color:#C3D6CD;font-size:16px;
    flex:0 0 auto;cursor:pointer;padding:2px 4px;
  }
  .wait-select{
    margin-top:6px;
    font-size:11px;
    border:1px solid var(--sage-line);
    border-radius:8px;
    padding:3px 6px;
    background:#fff;
    color:var(--ink-soft);
  }

  footer.note{margin-top:40px;text-align:center;font-size:11px;color:#9AAAA4;line-height:1.7;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;
    opacity:0;pointer-events:none;transition:all .3s ease;max-width:80%;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">からっぽマネージャー</div>
    <div class="tagline">話すだけで、頭の中を置いていく</div>
    <div class="modebadge">簡易版（AIなし・端末内のみで判定）</div>
  </header>

  <div class="orb-zone">
    <div class="orb-wrap">
      <div class="orb" id="orb">
        <svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
      </div>
    </div>
    <div class="orb-hint" id="orbHint">タップして話しかけてください</div>
    <div class="text-fallback" id="textFallback" style="display:none;">
      <input id="textInput" type="text" placeholder="例：金曜までに講座資料作る">
      <button id="textSend">送る</button>
    </div>

    <div class="confirm-panel" id="confirmPanel" style="display:none;">
      <div class="cp-title" id="cpTitle"></div>
      <div class="cp-meta" id="cpMeta"></div>
      <div class="cp-question">これは誰待ちですか？</div>
      <div class="cp-options">
        <div class="cp-option self" data-status="self">自分がやる</div>
        <div class="cp-option wait" data-status="reply">返信待ち</div>
        <div class="cp-option wait" data-status="material">素材待ち</div>
        <div class="cp-option wait" data-status="confirm">確認待ち</div>
      </div>
      <button class="cp-cancel" id="cpCancel">この内容を取り消す</button>
    </div>
  </div>

  <section class="block">
    <div class="block-title">今日やると楽になること <small>無理しなくていいものだけ</small></div>
    <div id="suggestArea"><div class="empty-note">まだ何も話していません。ひとつ話してみましょう。</div></div>
  </section>

  <section class="block">
    <div class="block-title">【待機中】 <small>自分の手は離れているもの</small></div>
    <div id="waitingArea"><div class="empty-note">今、誰か・何かを待っているタスクはありません。</div></div>
  </section>

  <section class="block">
    <div class="block-title">置いていったこと一覧</div>
    <div id="taskList"><div class="empty-note">ここにタスクが積まれていきます。</div></div>
  </section>

  <footer class="note">
    これは簡易版です。タイトル・カテゴリー・締切・優先度はキーワードから「仮で」判定しています。<br>
    記録はこの端末のブラウザ（localStorage）にのみ保存されます。
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'karappo_tasks_v1';

const orb = document.getElementById('orb');
const orbHint = document.getElementById('orbHint');
const textFallback = document.getElementById('textFallback');
const textInput = document.getElementById('textInput');
const textSend = document.getElementById('textSend');
const suggestArea = document.getElementById('suggestArea');
const waitingArea = document.getElementById('waitingArea');
const taskList = document.getElementById('taskList');
const toastEl = document.getElementById('toast');
const confirmPanel = document.getElementById('confirmPanel');
const cpTitle = document.getElementById('cpTitle');
const cpMeta = document.getElementById('cpMeta');
const cpCancel = document.getElementById('cpCancel');

let tasks = [];
let pendingTask = null;

const WAIT_LABELS = {
  self: '自分がやる',
  reply: '返信待ち',
  material: '素材待ち',
  confirm: '確認待ち'
};

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'), 2400);
}

function loadTasks(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    tasks = raw ? JSON.parse(raw) : [];
    tasks.forEach(t=>{ if(!t.waitStatus) t.waitStatus = 'self'; });
  }catch(e){
    tasks = [];
  }
}
function saveTasks(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }catch(e){
    showToast('保存に失敗しました（端末の空き容量等をご確認ください）');
  }
}

function pad2(n){ return String(n).padStart(2,'0'); }
function toDateStr(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}
function addDays(base, n){
  const d = new Date(base);
  d.setDate(d.getDate()+n);
  return d;
}
const WEEKDAY_INDEX = {"日":0,"月":1,"火":2,"水":3,"木":4,"金":5,"土":6};

function guessDeadline(text){
  const today = new Date();
  today.setHours(0,0,0,0);

  if(text.includes('今日')) return toDateStr(today);
  if(text.includes('明日')) return toDateStr(addDays(today,1));
  if(text.includes('あさって') || text.includes('明後日')) return toDateStr(addDays(today,2));

  const wdMatch = text.match(/([日月火水木金土])曜?日?まで/);
  if(wdMatch){
    const targetIdx = WEEKDAY_INDEX[wdMatch[1]];
    let diff = (targetIdx - today.getDay() + 7) % 7;
    if(diff === 0) diff = 7;
    return toDateStr(addDays(today, diff));
  }

  const dayMatch = text.match(/(\d{1,2})日(まで|に)/);
  if(dayMatch){
    const targetDay = parseInt(dayMatch[1], 10);
    let candidate = new Date(today.getFullYear(), today.getMonth(), targetDay);
    if(candidate < today) candidate = new Date(today.getFullYear(), today.getMonth()+1, targetDay);
    return toDateStr(candidate);
  }

  if(text.includes('今週中') || text.includes('今週末')){
    let diff = (5 - today.getDay() + 7) % 7;
    if(diff === 0) diff = 7;
    return toDateStr(addDays(today, diff));
  }
  if(text.includes('来週')){
    return toDateStr(addDays(today, 7));
  }
  if(text.includes('来月')){
    const d = new Date(today.getFullYear(), today.getMonth()+1, today.getDate());
    return toDateStr(d);
  }
  return null;
}

function guessCategory(text){
  const rules = [
    { cat:'子供', words:['次男','長男','長女','次女','息子','娘','子供','子ども','学校','サッカー','公文','持ち物','水筒','体操着','宿題','プール'] },
    { cat:'買い物', words:['買う','注文','Amazon','amazon','楽天','パッキン','洗剤','牛乳','米','コピー用紙'] },
    { cat:'旅行', words:['旅行','ホテル','飛行機','保険','フィンランド','ハワイ','宮古島'] },
    { cat:'家', words:['洗濯','掃除','片付け','ゴミ','犬','病院','予約'] },
    { cat:'仕事', words:['サムネ','三分割','名刺','リッチメニュー','投稿表紙','サンクスページ','LP','Canva','講座資料','返信','納品','修正','確認','デザイン'] },
  ];
  for(const rule of rules){
    if(rule.words.some(w => text.includes(w))) return rule.cat;
  }
  return 'その他';
}

function guessPriority(text, deadline){
  if(text.includes('今日') || text.includes('すぐ') || text.includes('急') || text.includes('至急')){
    return 'high';
  }
  if(deadline){
    const today = new Date(); today.setHours(0,0,0,0);
    const dl = new Date(deadline);
    const diffDays = Math.round((dl - today) / 86400000);
    if(diffDays <= 2) return 'high';
    if(diffDays <= 7) return 'mid';
    return 'low';
  }
  if(text.includes('いつか') || text.includes('そのうち')) return 'low';
  return 'mid';
}

function guessTitle(text){
  let t = text.trim();
  t = t.replace(/^(えーと|あの|そうだ|そういえば)、?\s*/,'');
  if(t.length > 40) t = t.slice(0,40) + '…';
  return t;
}

function parseTaskLocal(transcript){
  const text = transcript.trim();
  const deadline = guessDeadline(text);
  const category = guessCategory(text);
  const priority = guessPriority(text, deadline);
  const title = guessTitle(text);
  return { title, category, deadline, priority };
}

const GENTLE_MESSAGES = [
  '30分だけ進めると気持ちが軽くなりそうです',
  '今日やるとスッキリしそうです',
  '少しだけ手をつけると安心できそうです',
  '今のうちにやると後が楽になります',
  'ちょっとだけ進めておくと気が楽になりそうです'
];

function buildSuggestionsLocal(openTasks){
  const selfTasks = openTasks.filter(t => t.waitStatus === 'self');
  const priorityRank = { high:0, mid:1, low:2 };
  const sorted = [...selfTasks].sort((a,b)=>{
    const pr = priorityRank[a.priority] - priorityRank[b.priority];
    if(pr !== 0) return pr;
    if(a.deadline && b.deadline) return a.deadline < b.deadline ? -1 : 1;
    if(a.deadline) return -1;
    if(b.deadline) return 1;
    return 0;
  });
  return sorted.slice(0,3).map((t,i)=>({
    id: t.id,
    message: GENTLE_MESSAGES[i % GENTLE_MESSAGES.length]
  }));
}

function categoryEmoji(c){
  return {"仕事":"💼","子供":"🧒","買い物":"🛒","家":"🏠","旅行":"✈️"}[c] || "✨";
}
function escapeHtml(s){
  return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function taskMetaHtml(t){
  return `
    <span class="tag">${t.category}</span>
    <span class="tag priority-${t.priority}">優先度: ${t.priority==='high'?'高':t.priority==='mid'?'中':'低'}</span>
    ${t.deadline ? `<span class="tag deadline">〜${t.deadline}</span>`:''}
    ${t.waitStatus !== 'self' ? `<span class="tag wait">${WAIT_LABELS[t.waitStatus]}</span>`:''}
  `;
}

function waitSelectHtml(t){
  return `
    <select class="wait-select" data-waitchange="${t.id}">
      <option value="self" ${t.waitStatus==='self'?'selected':''}>自分がやる</option>
      <option value="reply" ${t.waitStatus==='reply'?'selected':''}>返信待ち</option>
      <option value="material" ${t.waitStatus==='material'?'selected':''}>素材待ち</option>
      <option value="confirm" ${t.waitStatus==='confirm'?'selected':''}>確認待ち</option>
    </select>
  `;
}

function renderTasks(){
  const open = tasks.filter(t=>!t.done).sort((a,b)=>(a.createdAt<b.createdAt?1:-1));
  const done = tasks.filter(t=>t.done);
  if(tasks.length === 0){
    taskList.innerHTML = '<div class="empty-note">ここにタスクが積まれていきます。</div>';
    return;
  }
  const renderOne = (t) => `
    <div class="task-card ${t.done?'done':''} ${t.waitStatus!=='self' && !t.done?'waiting':''}">
      <div class="check-btn ${t.done?'checked':''}" data-id="${t.id}">
        <svg viewBox="0 0 24 24"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
      </div>
      <div class="task-main">
        <div class="task-title">${categoryEmoji(t.category)} ${escapeHtml(t.title)}</div>
        <div class="task-meta">${taskMetaHtml(t)}</div>
        ${!t.done ? waitSelectHtml(t) : ''}
      </div>
      <button class="del-btn" data-del="${t.id}">×</button>
    </div>`;
  taskList.innerHTML = open.map(renderOne).join("") + done.map(renderOne).join("");
}

function renderSuggestions(){
  const open = tasks.filter(t=>!t.done);
  const selfOpen = open.filter(t=>t.waitStatus === 'self');
  if(selfOpen.length === 0){
    suggestArea.innerHTML = '<div class="empty-note">今は自分が動くタスクはなさそうです。とても良い状態です。</div>';
    return;
  }
  const sugg = buildSuggestionsLocal(open);
  if(sugg.length === 0){
    suggestArea.innerHTML = '<div class="empty-note">今日は何もしなくても大丈夫そうです。</div>';
    return;
  }
  suggestArea.innerHTML = sugg.map(s=>{
    const t = tasks.find(x=>x.id === s.id);
    if(!t) return '';
    return `<div class="suggest-card">
      <div class="msg">${escapeHtml(s.message)}</div>
      <div class="title">${categoryEmoji(t.category)} ${escapeHtml(t.title)}</div>
    </div>`;
  }).join("");
}

function renderWaiting(){
  const waiting = tasks.filter(t=>!t.done && t.waitStatus !== 'self');
  if(waiting.length === 0){
    waitingArea.innerHTML = '<div class="empty-note">今、誰か・何かを待っているタスクはありません。</div>';
    return;
  }
  waitingArea.innerHTML = waiting.map(t => `
    <div class="task-card waiting">
      <div class="check-btn" data-id="${t.id}">
        <svg viewBox="0 0 24 24"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
      </div>
      <div class="task-main">
        <div class="task-title">${categoryEmoji(t.category)} ${escapeHtml(t.title)}</div>
        <div class="task-meta">${taskMetaHtml(t)}</div>
        ${waitSelectHtml(t)}
      </div>
      <button class="del-btn" data-del="${t.id}">×</button>
    </div>
  `).join("");
}

function renderAll(){
  renderTasks();
  renderSuggestions();
  renderWaiting();
}

function addTaskFromText(transcript){
  if(!transcript || !transcript.trim()) return;
  const parsed = parseTaskLocal(transcript);
  pendingTask = {
    id: 't_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    title: parsed.title,
    category: parsed.category,
    deadline: parsed.deadline,
    priority: parsed.priority,
    done: false,
    createdAt: new Date().toISOString()
  };
  showConfirmPanel(pendingTask);
}

function showConfirmPanel(t){
  cpTitle.textContent = `${categoryEmoji(t.category)} ${t.title}`;
  const metaParts = [t.category];
  metaParts.push(t.priority==='high'?'優先度: 高':t.priority==='mid'?'優先度: 中':'優先度: 低');
  if(t.deadline) metaParts.push(`〜${t.deadline}`);
  cpMeta.textContent = metaParts.join(' ・ ');
  confirmPanel.style.display = 'block';
  orbHint.textContent = 'これは誰待ちですか？';
}

function hideConfirmPanel(){
  confirmPanel.style.display = 'none';
  orbHint.textContent = 'タップして話しかけてください';
}

function finalizePendingTask(waitStatus){
  if(!pendingTask) return;
  pendingTask.waitStatus = waitStatus;
  tasks.push(pendingTask);
  saveTasks();
  renderAll();

  if(waitStatus === 'self'){
    orb.classList.add('releasing');
    showToast('置いていきました');
    setTimeout(()=>{ orb.classList.remove('releasing'); }, 900);
  }else{
    showToast(`【待機中】に入れました（${WAIT_LABELS[waitStatus]}）`);
  }

  pendingTask = null;
  hideConfirmPanel();
}

confirmPanel.addEventListener('click', (e)=>{
  const opt = e.target.closest('.cp-option');
  if(opt){
    finalizePendingTask(opt.dataset.status);
  }
});
cpCancel.addEventListener('click', ()=>{
  pendingTask = null;
  hideConfirmPanel();
});

let recognition = null;
let isRecording = false;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    addTaskFromText(transcript);
  };
  recognition.onerror = () => {
    showToast('うまく聞き取れませんでした');
    stopRecordingUI();
  };
  recognition.onend = () => {
    stopRecordingUI();
  };
}else{
  textFallback.style.display = 'flex';
  orbHint.textContent = 'この端末では音声認識が使えないようです';
}

function startRecordingUI(){
  isRecording = true;
  orb.classList.add('recording');
  orbHint.textContent = '聞いています…';
}
function stopRecordingUI(){
  isRecording = false;
  orb.classList.remove('recording');
}

orb.addEventListener('click', () => {
  if(confirmPanel.style.display === 'block') return;
  if(!recognition){
    textFallback.style.display = 'flex';
    textInput.focus();
    return;
  }
  if(isRecording){
    recognition.stop();
    return;
  }
  try{
    recognition.start();
    startRecordingUI();
  }catch(e){
    showToast('マイクを使えませんでした');
  }
});

textSend.addEventListener('click', () => {
  if(confirmPanel.style.display === 'block') return;
  const v = textInput.value;
  textInput.value = '';
  addTaskFromText(v);
});
textInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    textSend.click();
  }
});

function handleListClick(e){
  const checkBtn = e.target.closest('.check-btn');
  if(checkBtn){
    const id = checkBtn.dataset.id;
    const t = tasks.find(x=>x.id === id);
    if(t){
      t.done = !t.done;
      saveTasks();
      renderAll();
    }
    return;
  }
  const delBtn = e.target.closest('.del-btn');
  if(delBtn){
    const id = delBtn.dataset.del;
    tasks = tasks.filter(x=>x.id !== id);
    saveTasks();
    renderAll();
  }
}
function handleListChange(e){
  const sel = e.target.closest('.wait-select');
  if(sel){
    const id = sel.dataset.waitchange;
    const t = tasks.find(x=>x.id === id);
    if(t){
      t.waitStatus = sel.value;
      saveTasks();
      renderAll();
    }
  }
}

taskList.addEventListener('click', handleListClick);
taskList.addEventListener('change', handleListChange);
waitingArea.addEventListener('click', handleListClick);
waitingArea.addEventListener('change', handleListChange);

loadTasks();
renderAll();
</script>
</body>
</html>
